<section id="{{id}}" class="slits">
	<ul class="floaties">
		<li class="slanted">
			<div class="unslanted">
				<video loop="true">
					<source type="video/mp4" src="vid/titlecards/footballhq.mp4"></source>
					<source type="video/webm" src="vid/titlecards/footballhq.webm"></source>
				</video>
			</div>
		</li>
		<li class="slanted">
			<div class="unslanted">
				<video loop="true">
					<source type="video/mp4" src="vid/titlecards/academics.mp4"></source>
					<source type="video/webm" src="vid/titlecards/academics.webm"></source>
				</video>
			</div>
		</li>
	</ul>
	<div class="mesh"></div>
	<ul class="absoluties">
		<li>
			<h1 class="headline">football</h1>
			<a ng-mouseenter="onTitleButtonOver()" ng-mouseleave="onTitleButtonOut()" class="titleCardButton" href="#!/footballhq/facilities">

				<div class="top"></div>
				<div class="bottom"></div>
				<p>take the tour</p>
			</a>
		</li>
		<li>
			<h1 class="headline">academics</h1>
			<a ng-mouseenter="onTitleButtonOver()" ng-mouseleave="onTitleButtonOut()" class="titleCardButton" href="#!/academics/welcometojaqua">
				<div class="border"></div>
				<div class="top"></div>
				<div class="bottom"></div>
				<p>explore the jaqua center</p>
			</a>
		</li>
	</ul>
</section>
